<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mooii Lyrics</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <h1>Mooii Lyrics</h1>
        <a
          href="https://www.instagram.com/bandthemooii/"
          class="insta-link"
          target="_blank"
          aria-label="Mooii Instagram">
          <img src="static/icon.avif" alt="Instagram" class="insta-img" />
        </a>
      </div>
      <div class="lang-switch">
        <button data-lang="ko">한글</button>
        <button data-lang="en">English</button>
        <button data-lang="es">Español</button>
        <button data-lang="ja">日本語</button>
      </div>
      
      <!-- Band slogan that changes dynamically based on selected language -->
      <p id="slogan" class="slogan">우리가 실제로 보고 겪은 일들을, 최대한 솔직하게</p>
      

    </header>
    
    <main id="songs-list">
      <!-- 곡 리스트가 JS로 렌더링됩니다 -->
    </main>
    
    <footer>
      <p>© 2025 Mooii Band</p>
    </footer>
    <script src="lyrics.js"></script>
  </body>
</html>
